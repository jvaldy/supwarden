services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    working_dir: /app/apps/api
    command: sh -c "composer install && php -S 0.0.0.0:${APP_PORT:-8000} -t public"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-supwarden}:${POSTGRES_PASSWORD:-supwarden}@db:5432/${POSTGRES_DB:-supwarden}?serverVersion=16&charset=utf8
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3000/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureJWTSecret!}
    volumes:
      - ./:/app
      - api_vendor:/app/apps/api/vendor
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      - db
      - mercure

  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supwarden}
      POSTGRES_USER: ${POSTGRES_USER:-supwarden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supwarden}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: :80
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureJWTSecret!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureJWTSecret!}
      MERCURE_CORS_ALLOWED_ORIGINS: ${MERCURE_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    volumes:
      - ./infra/docker/mercure/Caddyfile:/etc/caddy/Caddyfile:ro
      - mercure_data:/data
      - mercure_config:/config
    ports:
      - "${MERCURE_PORT:-3000}:80"

volumes:
  api_vendor:
  web_node_modules:
  postgres_data:
  mercure_data:
  mercure_config:

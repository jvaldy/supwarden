services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    working_dir: /app/apps/api
    command: sh /app/scripts/start-api.sh
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      GOOGLE_OAUTH_FRONTEND_CALLBACK_URL: ${GOOGLE_OAUTH_FRONTEND_CALLBACK_URL}
    volumes:
      - ./:/app
      - api_vendor:/app/apps/api/vendor
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${APP_PORT:-8000}/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      mercure:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    working_dir: /app/apps/web
    command: sh -c "npm ci --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${WEB_PORT:-5173} >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  adminer:
    image: ${ADMINER_IMAGE:-adminer:4}
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mercure:
    image: ${MERCURE_IMAGE:-dunglas/mercure}
    environment:
      SERVER_NAME: :80
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_CORS_ALLOWED_ORIGINS: ${MERCURE_CORS_ALLOWED_ORIGINS}
    volumes:
      - ./infra/docker/mercure/Caddyfile:/etc/caddy/Caddyfile:ro
      - mercure_data:/data
      - mercure_config:/config
    ports:
      - "${MERCURE_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  api_vendor:
  web_node_modules:
  postgres_data:
  mercure_data:
  mercure_config:
